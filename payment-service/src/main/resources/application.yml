spring:
  application:
    name: payment-service

  config:
    import: "vault://"

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
      password: ${spring.data.redis.password}

  cloud:
    vault:
      uri: ${SPRING_CLOUD_VAULT_URI:http://localhost:8200}
      token: ${SPRING_CLOUD_VAULT_TOKEN:root-token}
      enabled: true
      fail-fast: true
      kv:
        enabled: true
        backend: secret
        default-context: payment-service
        backend-version: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

  web:
    error:
      include-message: always
      include-binding-errors: always

server:
  port: 8086
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  issuer: user-service
  access:
    secret: ${jwt.access.secret}

kapitalbank:
  api-url: ${KAPITALBANK_API_URL:https://txpgtst.kapitalbank.az/api}
  username: ${KAPITALBANK_USERNAME:TerminalSys/kapital}
  password: ${KAPITALBANK_PASSWORD:kapital123}
  currency: "AZN"
  language: "az"
  callback-base-url: ${KAPITALBANK_CALLBACK_BASE_URL:http://localhost:8086/api/v1}

services:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8085/api/v1}

frontend:
  success-url: ${FRONTEND_SUCCESS_URL:http://localhost:3000/payment/success}
  cancel-url: ${FRONTEND_CANCEL_URL:http://localhost:3000/payment/cancel}
  decline-url: ${FRONTEND_DECLINE_URL:http://localhost:3000/payment/decline}

logging:
  level:
    root: INFO
    com.ecommerce.paymentservice: DEBUG
    org.springframework.security: INFO
