<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #2e7d32;">Order Confirmed</h2>
    <p>Hi <span th:text="${firstName}">Customer</span>,</p>
    <p>Your order <strong th:text="${orderNumber}">ORD-XXX</strong> has been confirmed and is being prepared.</p>
    <p>We'll notify you once your order is shipped.</p>
    <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">
    <p style="color: #888; font-size: 12px;">Thank you for your purchase!</p>
</body>
</html>
