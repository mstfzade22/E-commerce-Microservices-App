version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: unless-stopped
    mem_limit: 256m
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 || [ $$? -eq 2 ]"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    mem_limit: 64m
    entrypoint: /bin/sh
    command: ["/vault-init.sh"]
    volumes:
      - ./vault-init.sh:/vault-init.sh
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root-token
    networks:
      - ecommerce-network
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    mem_limit: 256m
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    mem_limit: 768m
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    restart: unless-stopped
    mem_limit: 128m
    profiles: ["debug"]
    environment:
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8090:8080"
    networks:
      - ecommerce-network
    depends_on:
      kafka:
        condition: service_healthy

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    mem_limit: 128m
    profiles: ["debug"]
    ports:
      - "5540:5540"
    networks:
      - ecommerce-network
    depends_on:
      - redis

  ms-api-gateway:
    build:
      context: ./ms-api-gateway
      dockerfile: Dockerfile
    container_name: ms-api-gateway
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_DATA_REDIS_HOST: redis
    networks:
      - ecommerce-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ms-user:
        condition: service_started
      ms-product:
        condition: service_started
      ms-inventory:
        condition: service_started
      ms-cart:
        condition: service_started
      ms-order:
        condition: service_started
      ms-payment:
        condition: service_started
      ms-notification:
        condition: service_started

  ms-user:
    build:
      context: ./ms-user
      dockerfile: Dockerfile
    container_name: ms-user
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_DATA_REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - ecommerce-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ms-product:
    build:
      context: ./ms-product
      dockerfile: Dockerfile
    container_name: ms-product
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8082:8082"
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_DATA_REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
    networks:
      - ecommerce-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  ms-inventory:
    build:
      context: ./ms-inventory
      dockerfile: Dockerfile
    container_name: ms-inventory
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8083:8083"
      - "9091:9091"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_DATA_REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - ecommerce-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ms-cart:
    build:
      context: ./ms-cart
      dockerfile: Dockerfile
    container_name: ms-cart
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_DATA_REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GRPC_PRODUCT_SERVICE_HOST: ms-product
      GRPC_INVENTORY_SERVICE_HOST: ms-inventory
    networks:
      - ecommerce-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ms-product:
        condition: service_started
      ms-inventory:
        condition: service_started

  ms-order:
    build:
      context: ./ms-order
      dockerfile: Dockerfile
    container_name: ms-order
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_DATA_REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GRPC_PRODUCT_SERVICE_HOST: ms-product
      GRPC_INVENTORY_SERVICE_HOST: ms-inventory
      CART_SERVICE_URL: http://ms-cart:8084/api/v1
    networks:
      - ecommerce-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ms-product:
        condition: service_started
      ms-inventory:
        condition: service_started
      ms-cart:
        condition: service_started

  ms-payment:
    build:
      context: ./ms-payment
      dockerfile: Dockerfile
    container_name: ms-payment
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_DATA_REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAPITALBANK_API_URL: https://txpgtst.kapitalbank.az/api
      KAPITALBANK_USERNAME: TerminalSys/kapital
      KAPITALBANK_PASSWORD: kapital123
      KAPITALBANK_CALLBACK_BASE_URL: https://yoursite.com/api/v1
      ORDER_SERVICE_URL: http://ms-order:8085/api/v1
    networks:
      - ecommerce-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ms-order:
        condition: service_started

  ms-notification:
    build:
      context: ./ms-notification
      dockerfile: Dockerfile
    container_name: ms-notification
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: root-token
      SPRING_DATA_REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USER_SERVICE_URL: http://ms-user:8081/api/v1
    networks:
      - ecommerce-network
    depends_on:
      vault-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ms-user:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "80:80"
    networks:
      - ecommerce-network
    depends_on:
      ms-api-gateway:
        condition: service_started

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kafka_data:
